<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JeetTextutils.com</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">JeetTextutils.com</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/about_us">About Us</a>
                <li class="nav-item dropdown">
                    <a class="nav-link " href="/about">
                        About
                    </a>
                </li>
            </ul>
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
        </div>
    </div>
</nav>
<div class="alert alert-success alert-dismissible fade show" role="alert">
    <strong>Welcome! baka </strong> Maja aave Tekarje bka.
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
<div class="container">
    <form action='/home' method="post">  {% csrf_token %}
        <div class="mb-3">
            <label for="exampleFormControlTextarea1" class="form-label">Ayaya maja aave te nakh je baka:</label>
            <textarea class="form-control" name='text' id="exampleFormControlTextarea1" rows="10"></textarea>

        </div>
        <div class="form-check form-switch">
            <input class="form-check-input" name='removepunc' type="checkbox" role="switch" id="switchCheckDefault">
            <label class="form-check-label" for="switchCheckDefault">remove punctuation</label>
        </div>
        <div class="form-check form-switch">
            <input class="form-check-input" name='fullcap' type="checkbox" role="switch" id="switchCheckDefault1">
            <label class="form-check-label" for="switchCheckDefault">UPARCASE</label>
        </div>
        <div class="form-check form-switch">
            <input class="form-check-input" name='newlineremove' type="checkbox" role="switch" id="switchCheckDefault2">
            <label class="form-check-label" for="switchCheckDefault">New Line Remove</label>
        </div>
        <div class="form-check form-switch">
            <input class="form-check-input" name='spaceRemover' type="checkbox" role="switch" id="switchCheckDefault3">
            <label class="form-check-label" for="switchCheckDefault">Space Remove</label>
        </div>
        <div class="form-check form-switch">
            <input class="form-check-input" name='cherCounter' type="checkbox" role="switch" id="switchCheckDefault4">
            <label class="form-check-label" for="switchCheckDefault">Chare counter</label>
        </div>
        <button type="Submit" class="btn btn-dark">Analyze Text</button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
